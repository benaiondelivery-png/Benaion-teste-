<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Benaion Delivery | Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #bc0000; --accent: #f2b705; --bg: #000; --card: #111; --text: #fff; --green: #25d366; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }

        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); height: 60px; display: flex; justify-content: center; align-items: center; z-index: 1000; border-bottom: 2px solid var(--primary); }
        header { padding: 100px 20px 40px; text-align: center; background: linear-gradient(0deg, #000, #300); }
        .logo { font-family: 'Oswald'; font-size: 4.5rem; color: var(--accent); margin: 0; line-height: 0.8; font-style: italic; }

        .container { max-width: 480px; margin: 0 auto; padding: 0 15px; }
        .card { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid #222; margin-top: -30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }

        .peg-banner { background: linear-gradient(45deg, #400, #bc0000); padding: 15px; border-radius: 15px; margin-bottom: 20px; font-size: 0.8rem; border: 1px solid var(--accent); }
        
        label { font-size: 0.65rem; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: block; margin: 15px 0 5px; }
        input, select, textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-size: 1rem; }
        
        .forbidden { font-size: 0.7rem; color: #ff4444; background: rgba(255,0,0,0.1); padding: 10px; border-radius: 10px; margin-top: 15px; border: 1px solid #400; }
        
        .btn-order { background: var(--green); color: #000; font-weight: 900; width: 100%; padding: 20px; border-radius: 15px; border: none; font-size: 1.1rem; cursor: pointer; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* Painel Admin */
        #admin-panel { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; padding: 20px; overflow-y: auto; }
        .cron-val { font-family: 'Oswald'; font-size: 6rem; color: var(--accent); text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

<nav><div style="font-family:'Oswald'; color:var(--accent); font-size:1.5rem;">BENAION DELIVERY</div></nav>

<header>
    <h1 class="logo">BENAION</h1>
    <p style="color:#666; font-size:0.7rem; letter-spacing:5px; font-weight:800;">Laranjal do Jari/AP</p>
</header>

<div class="container">
    <div class="card">
        <div class="peg-banner">
            <strong>рҹҺҒ PROMOГҮГғO PEG:</strong> A cada 5 pedidos em 7 dias, ganhe 1 taxa base grГЎtis!
        </div>

        <label>Seu Nome</label>
        <input type="text" id="c_nome" placeholder="Nome completo">

        <label>Bairro de Entrega</label>
        <select id="c_bairro" onchange="updateTax()">
            <option value="0" data-t="0">Selecione o bairro...</option>
            <option value="Agreste" data-t="5">Agreste (R$ 5,00)</option>
            <option value="Nova EsperanГ§a" data-t="5">Nova EsperanГ§a (R$ 5,00)</option>
            <option value="Prosperidade" data-t="5">Prosperidade (R$ 5,00)</option>
            <option value="Castanheira" data-t="5">Castanheira (R$ 5,00)</option>
            <option value="Mirilandia" data-t="5">Mirilandia (R$ 5,00)</option>
            <option value="JosГ© CesГЎrio" data-t="5">JosГ© CesГЎrio (R$ 5,00)</option>
            <option value="Centro" data-t="6">Centro (R$ 6,00)</option>
            <option value="Cajari" data-t="6">Cajari (R$ 6,00)</option>
            <option value="Rodovia do GogГі" data-t="7">Rodovia do GogГі (R$ 7,00)</option>
            <option value="Buritizal" data-t="7">Buritizal (R$ 7,00)</option>
            <option value="Sarney" data-t="7">Sarney (R$ 7,00)</option>
            <option value="Rio Branco" data-t="7">Rio Branco (R$ 7,00)</option>
            <option value="Malvinas" data-t="8">Malvinas (R$ 8,00)</option>
            <option value="NazarГ© Mineiro" data-t="10">NazarГ© Mineiro (R$ 10,00)</option>
            <option value="SamaГәma" data-t="15">SamaГәma (R$ 15,00)</option>
            <option value="Monte Dourado" data-t="30">Monte Dourado (R$ 30,00)</option>
        </select>

        <div id="tax-box" style="display:none; text-align:center; margin:15px 0;">
            <span style="font-size:0.7rem; color:var(--accent)">TAXA BASE:</span><br>
            <span id="tax-val" style="font-size:2.5rem; font-family:'Oswald'; color:white;">R$ 0,00</span>
        </div>

        <label>Deseja usar sua entrega grГЎtis (PEG)?</label>
        <select id="c_peg">
            <option value="NГЈo">NГЈo (Seguir com cobranГ§a normal)</option>
            <option value="SIM! QUERO USAR MINHA ENTREGA GRГҒTIS!">вң… Sim, quero usar meu bГҙnus!</option>
        </select>

        <label>EndereГ§o de Retirada (Onde buscar?)</label>
        <input type="text" id="c_retirada" placeholder="Ex: Mercantil Jari">

        <label>Qual produto?</label>
        <textarea id="c_produto" rows="2" placeholder="Descreva o que vamos buscar"></textarea>

        <label>EndereГ§o de Entrega (Rua e NВә)</label>
        <input type="text" id="c_entrega" placeholder="Rua, nГәmero e referГӘncia">

        <label>Forma de Pagamento</label>
        <select id="c_pag">
            <option value="PIX">PIX</option>
            <option value="CartГЈo">CartГЈo</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>

        <label>Troco (Se necessГЎrio)</label>
        <input type="text" id="c_troco" placeholder="Troco para quanto?">

        <label>Agendar para Г s (Opcional)</label>
        <input type="time" id="c_hora">

        <div class="forbidden">
            <strong>вҡ пёҸ NГғO ENTREGAMOS:</strong> Bebidas, Cigarros, Drogas e Pessoas.
        </div>

        <button onclick="enviarPedido()" class="btn-order">ENVIAR COMANDA <i class="fab fa-whatsapp"></i></button>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="font-family:'Oswald'; color:var(--accent);">BENAION CONTROL</h2>
        <button onclick="fecharAdmin()" style="background:red; color:#fff; border:none; padding:10px 15px; border-radius:10px;">X</button>
    </div>
    <div class="cron-val" id="cron-val">00:00</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button onclick="startCron()" style="background:var(--green); padding:20px; border-radius:15px; font-weight:900; border:none;">CHEGUEI</button>
        <button onclick="stopCron()" style="background:white; padding:20px; border-radius:15px; font-weight:900; border:none;">SAГҚ</button>
    </div>
    <div id="admin-calc" style="background:#111; padding:20px; border-radius:20px; margin-top:20px; border:1px solid #333;">
        <label>Volume Extra</label>
        <select id="adm_vol"><option value="0">Nenhum</option><option value="2">Metade Bag (R$ 2)</option><option value="5">Bag Cheia (R$ 5)</option></select>
        <label>Minutos Totais</label>
        <input type="number" id="adm_min">
        <label>Compras R$</label>
        <input type="number" id="adm_compras">
        <button onclick="gerarRecibo()" class="btn-order" style="background:var(--accent); color:#000;">GERAR RECIBO FINAL</button>
        <div id="recibo-final" style="margin-top:20px; font-family:monospace; color:var(--accent); white-space:pre-wrap; background:#000; padding:15px; border:1px dashed #444;"></div>
    </div>
</div>

<footer style="text-align:center; padding:50px; opacity:0.1;"><button onclick="acessoAdmin()" style="background:none; border:none; color:#fff; cursor:pointer;">STAFF ONLY</button></footer>

<script>
    function acessoAdmin() { if(prompt("Senha:") === "1010") document.getElementById('admin-panel').style.display='block'; }
    function fecharAdmin() { document.getElementById('admin-panel').style.display='none'; }

    function updateTax() {
        const s = document.getElementById('c_bairro');
        const t = s.options[s.selectedIndex].getAttribute('data-t');
        document.getElementById('tax-val').innerText = `R$ ${t},00`;
        document.getElementById('tax-box').style.display = t > 0 ? 'block' : 'none';
    }

    function enviarPedido() {
        const n = document.getElementById('c_nome').value;
        const b = document.getElementById('c_bairro').value;
        const p = document.getElementById('c_produto').value;
        const peg = document.getElementById('c_peg').value;
        if(!n || b=="0" || !p) return alert("Preencha Nome, Bairro e Produto!");

        const comanda = `*BENAION DELIVERY - PEDIDO*%0A` +
                        `*PROMOГҮГғO:* ${peg}%0A` +
                        `----------------------------%0A` +
                        `*CLIENTEрҹҷӢвҖҚвҷӮпёҸ:* ${n}%0A` +
                        `*ENDEREГҮO DE RETIRADAрҹӣ’:* ${document.getElementById('c_retirada').value}%0A` +
                        `*QUAL PRODUTO:* ${p}%0A` +
                        `*ENDEREГҮO DE ENTREGAрҹҸЎ:* ${b}, ${document.getElementById('c_entrega').value}%0A` +
                        `*FORMA DE PAGAMENTOрҹ’°:* ${document.getElementById('c_pag').value}%0A` +
                        `*TROCOрҹ’ұ:* ${document.getElementById('c_troco').value}%0A` +
                        `*AGENDAR:* ${document.getElementById('c_hora').value}%0A` +
                        `----------------------------%0A` +
                        `*BIT.LY/BENAIONDELIVERY*`;
        window.open(`https://wa.me/5596991677854?text=${comanda}`);
    }

    let t_start, t_int;
    function startCron() { t_start = Date.now(); t_int = setInterval(()=>{
        const d = Date.now()-t_start;
        const m = Math.floor(d/60000).toString().padStart(2,'0');
        const s = Math.floor((d%60000)/1000).toString().padStart(2,'0');
        document.getElementById('cron-val').innerText = `${m}:${s}`;
    }, 1000); }
    function stopCron() { clearInterval(t_int); document.getElementById('adm_min').value = Math.floor((Date.now()-t_start)/60000); }

    function gerarRecibo() {
        const m = parseInt(document.getElementById('adm_min').value) || 0;
        const c = parseFloat(document.getElementById('adm_compras').value) || 0;
        const v = parseFloat(document.getElementById('adm_vol').value) || 0;
        const s = document.getElementById('c_bairro');
        const t = parseFloat(s.options[s.selectedIndex].getAttribute('data-t')) || 0;
        const extra = m > 3 ? (m-3)*0.3 : 0;
        const total = t + c + extra + v;

        document.getElementById('recibo-final').innerText = 
            `вң… *RECIBO BENAION DELIVERY*\n` +
            `Taxa Bairro: R$ ${t.toFixed(2)}\n` +
            `Tempo (${m} min): R$ ${extra.toFixed(2)}\n` +
            `Volume/Bag: R$ ${v.toFixed(2)}\n` +
            `Compras: R$ ${c.toFixed(2)}\n` +
            `---------------------------\n` +
            `*TOTAL: R$ ${total.toFixed(2)}*`;
    }
</script>
</body>
</html>
